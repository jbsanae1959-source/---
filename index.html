<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>気学鑑定書</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&display=swap');
    :root {
      --ink: #1a1a2e; --gold: #b8860b; --gold-light: #f5e6a3;
      --red: #8b0000; --bg: #faf8f3; --paper: #fff9ef;
      --border: #c8b87a; --muted: #6b6b6b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }
    header { background: var(--ink); color: #fff; text-align: center; padding: 18px 20px 14px; }
    header::after { content: ''; display: block; height: 3px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin-top: 12px; }
    header h1 { font-family: 'Noto Serif JP', serif; font-size: 1.7rem; letter-spacing: 0.3em; color: var(--gold-light); }
    header p.ver { font-size: 0.7rem; color: #aaa; margin-top: 4px; letter-spacing: 0.15em; }
    #form-section { max-width: 520px; margin: 36px auto; padding: 0 16px; }
    .form-card { background: var(--paper); border: 1px solid var(--border); border-radius: 8px; padding: 28px 28px 32px; box-shadow: 0 4px 18px rgba(0,0,0,0.08); }
    .form-card h2 { font-family: 'Noto Serif JP', serif; font-size: 1.05rem; letter-spacing: 0.2em; color: var(--gold); border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 22px; }
    .field { margin-bottom: 18px; }
    .field label { display: block; font-size: 0.85rem; font-weight: 700; margin-bottom: 6px; }
    .field label .req { color: var(--red); margin-left: 4px; font-size: 0.75rem; }
    .field label .opt { color: var(--muted); font-size: 0.72rem; margin-left: 4px; }
    .field input, .field select { width: 100%; padding: 9px 12px; border: 1px solid #c8b87a; border-radius: 5px; background: #fffef9; font-family: 'Noto Sans JP', sans-serif; font-size: 0.95rem; color: var(--ink); outline: none; transition: border-color 0.2s; }
    .field input:focus, .field select:focus { border-color: var(--gold); }
    .field .error-msg { color: var(--red); font-size: 0.78rem; margin-top: 4px; display: none; }
    .field.has-error input, .field.has-error select { border-color: var(--red); }
    .field.has-error .error-msg { display: block; }
    .btn-primary { display: block; width: 100%; padding: 13px; background: var(--ink); color: var(--gold-light); border: none; border-radius: 6px; font-family: 'Noto Serif JP', serif; font-size: 1rem; letter-spacing: 0.25em; cursor: pointer; margin-top: 24px; transition: background 0.2s; }
    .btn-primary:hover { background: #2c2c50; }
    #db-loading { text-align: center; padding: 20px; font-size: 0.85rem; color: var(--muted); display: none; }
    #loading-section { display: none; text-align: center; padding: 60px 20px; }
    .spinner { width: 48px; height: 48px; border: 4px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-section p { color: var(--muted); font-size: 0.9rem; letter-spacing: 0.1em; }
    #result-section { display: none; max-width: 760px; margin: 28px auto 60px; padding: 0 16px; }
    .kanteisho { background: var(--paper); border: 2px solid var(--border); border-radius: 4px; padding: 36px 32px 40px; box-shadow: 0 6px 24px rgba(0,0,0,0.1); }
    .kanteisho-title { text-align: center; margin-bottom: 30px; }
    .kanteisho-title h2 { font-family: 'Noto Serif JP', serif; font-size: 1.9rem; letter-spacing: 0.5em; color: var(--ink); border-top: 2px solid var(--gold); border-bottom: 2px solid var(--gold); display: inline-block; padding: 8px 24px; }
    .kanteisho-title .subtitle { margin-top: 8px; font-size: 0.8rem; color: var(--muted); letter-spacing: 0.2em; }
    .person-info { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 28px; padding: 14px 18px; background: #f5edd8; border: 1px solid var(--border); border-radius: 4px; font-size: 0.88rem; }
    .person-info span { color: var(--muted); }
    .person-info strong { color: var(--ink); margin-left: 4px; }
    .table-section { margin-bottom: 30px; }
    .section-heading { font-family: 'Noto Serif JP', serif; font-size: 0.95rem; letter-spacing: 0.2em; color: var(--gold); border-left: 3px solid var(--gold); padding-left: 10px; margin-bottom: 12px; }
    table.kanteihyo { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    table.kanteihyo th { background: var(--ink); color: var(--gold-light); font-family: 'Noto Serif JP', serif; letter-spacing: 0.15em; padding: 8px 10px; border: 1px solid #3a3a5c; text-align: center; font-weight: 400; }
    table.kanteihyo td { padding: 8px 12px; border: 1px solid #d5c99a; text-align: center; background: #fffdf4; }
    table.kanteihyo tr:nth-child(even) td { background: #f9f3e3; }
    table.kanteihyo td:first-child { font-weight: 700; color: var(--muted); background: #f0e8cd; font-size: 0.82rem; }
    .ai-section { margin-bottom: 26px; }
    .ai-section .ai-label { display: inline-block; font-size: 0.68rem; background: var(--gold); color: #fff; padding: 1px 8px; border-radius: 3px; letter-spacing: 0.1em; margin-left: 8px; vertical-align: middle; }
    .ai-content { margin-top: 12px; padding: 16px 18px; background: #fffdf4; border: 1px solid #d5c99a; border-radius: 4px; font-size: 0.9rem; line-height: 1.85; color: #2a2a3a; white-space: pre-wrap; }
    .monthly-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; margin-top: 12px; }
    .month-card { background: #fffdf4; border: 1px solid #d5c99a; border-radius: 4px; padding: 10px 14px; font-size: 0.84rem; }
    .month-card .month-label { font-weight: 700; color: var(--gold); margin-bottom: 4px; }
    .month-card .month-text { color: #2a2a3a; line-height: 1.7; }
    .action-row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 30px; padding-top: 20px; border-top: 1px solid var(--border); }
    .btn-action { flex: 1; min-width: 140px; padding: 11px 16px; border: 1px solid var(--border); border-radius: 5px; background: #fff; color: var(--ink); font-family: 'Noto Sans JP', sans-serif; font-size: 0.88rem; cursor: pointer; transition: background 0.2s; letter-spacing: 0.1em; }
    .btn-action:hover { background: #f5edd8; }
    .btn-back { flex: 1; min-width: 140px; padding: 11px 16px; border: none; border-radius: 5px; background: var(--ink); color: var(--gold-light); font-family: 'Noto Serif JP', serif; font-size: 0.88rem; cursor: pointer; letter-spacing: 0.15em; transition: background 0.2s; }
    .btn-back:hover { background: #2c2c50; }
    .not-found-msg { background: #fff3f3; border: 1px solid #e0a0a0; border-radius: 5px; padding: 14px 18px; color: var(--red); font-size: 0.9rem; margin-top: 8px; }
    @media print { header, .action-row, #form-section, #loading-section { display: none !important; } #result-section { display: block !important; margin: 0; padding: 0; } .kanteisho { box-shadow: none; border: 1px solid #999; } }
    @media (max-width: 500px) { .kanteisho { padding: 22px 16px 28px; } .kanteisho-title h2 { font-size: 1.4rem; } table.kanteihyo { font-size: 0.78rem; } }
  </style>
</head>
<body>

<header>
  <h1>気　学　鑑　定　書</h1>
  <p class="ver">v2.0 — 暦DBより正確算出</p>
</header>

<section id="form-section">
  <div class="form-card">
    <h2>鑑定情報の入力</h2>
    <div class="field" id="f-name">
      <label>お名前又はニックネーム<span class="req">必須</span></label>
      <input type="text" id="inp-name" placeholder="お名前を入力してください" />
      <div class="error-msg">お名前を入力してください</div>
    </div>
    <div class="field" id="f-gender">
      <label>性別<span class="req">必須</span></label>
      <select id="inp-gender">
        <option value="">選択してください</option>
        <option value="女性">女性</option>
        <option value="男性">男性</option>
      </select>
      <div class="error-msg">性別を選択してください</div>
    </div>
    <div class="field" id="f-dob">
      <label>生年月日<span class="req">必須</span></label>
      <input type="date" id="inp-dob" />
      <div class="error-msg">生年月日を入力してください</div>
    </div>
    <div class="field" id="f-time">
      <label>生時（生まれた時間）<span class="opt">任意</span></label>
      <select id="inp-time">
        <option value="">不明・未入力</option>
        <option value="子（ね）23:00〜1:00">子（ね）23:00〜1:00</option>
        <option value="丑（うし）1:00〜3:00">丑（うし）1:00〜3:00</option>
        <option value="寅（とら）3:00〜5:00">寅（とら）3:00〜5:00</option>
        <option value="卯（う）5:00〜7:00">卯（う）5:00〜7:00</option>
        <option value="辰（たつ）7:00〜9:00">辰（たつ）7:00〜9:00</option>
        <option value="巳（み）9:00〜11:00">巳（み）9:00〜11:00</option>
        <option value="午（うま）11:00〜13:00">午（うま）11:00〜13:00</option>
        <option value="未（ひつじ）13:00〜15:00">未（ひつじ）13:00〜15:00</option>
        <option value="申（さる）15:00〜17:00">申（さる）15:00〜17:00</option>
        <option value="酉（とり）17:00〜19:00">酉（とり）17:00〜19:00</option>
        <option value="戌（いぬ）19:00〜21:00">戌（いぬ）19:00〜21:00</option>
        <option value="亥（い）21:00〜23:00">亥（い）21:00〜23:00</option>
      </select>
    </div>
    <div id="db-loading">暦データを読み込み中...</div>
    <button class="btn-primary" id="btn-create" onclick="createKanteisho()">鑑定書を作成する</button>
  </div>
</section>

<section id="loading-section">
  <div class="spinner"></div>
  <p>AIが鑑定文を生成中...</p>
</section>

<section id="result-section">
  <div class="kanteisho">
    <div class="kanteisho-title">
      <h2>気 学 鑑 定 書</h2>
      <div class="subtitle">九星気学 — 暦DB正確算出</div>
    </div>
    <div class="person-info" id="person-info"></div>
    <div class="table-section">
      <div class="section-heading">九星気学 鑑定表</div>
      <table class="kanteihyo">
        <thead>
          <tr>
            <th></th><th>九 星</th><th>十 干</th><th>十 二 支</th><th>陰 陽</th>
          </tr>
        </thead>
        <tbody id="kanteihyo-body"></tbody>
      </table>
    </div>
    <div class="ai-section">
      <div class="section-heading">性格の特徴 <span class="ai-label">AI生成</span></div>
      <div class="ai-content" id="ai-seikaku">生成中...</div>
    </div>
    <div class="ai-section">
      <div class="section-heading">仕事運気特徴 <span class="ai-label">AI生成</span></div>
      <div class="ai-content" id="ai-shigoto">生成中...</div>
    </div>
    <div class="ai-section">
      <div class="section-heading">2026年の運気 <span class="ai-label">AI生成</span></div>
      <div class="ai-content" id="ai-2026">生成中...</div>
    </div>
    <div class="ai-section">
      <div class="section-heading">月別運気 <span class="ai-label">AI生成</span></div>
      <div class="monthly-grid" id="ai-monthly"></div>
    </div>
    <div class="action-row">
      <button class="btn-action" onclick="window.print()">🖨 印刷 / PDF保存</button>
      <button class="btn-back" onclick="goBack()">← 新しい鑑定をする</button>
    </div>
  </div>
</section>

<script src="db.js"></script>
<script>
function lookupDB(dateStr) {
  // dateStr は "YYYY-MM-DD" (input[type=date]の値)
  var parts = dateStr.split('-');
  var key = parts[0] + '/' + parts[1] + '/' + parts[2];
  if (typeof KIGAKU_DB !== 'undefined' && KIGAKU_DB[key]) {
    var d = KIGAKU_DB[key];
    return {
      nenKyusei: d[0], nenKan: d[1], nenShi: d[2],
      tsuKyusei: d[3], tsuKan: d[4], tsuShi: d[5],
      nichiKyusei: d[6], nichiKan: d[7], nichiShi: d[8],
      setsuhi: d[9], inyo: d[10]
    };
  }
  return null;
}

function validate() {
  var name = document.getElementById('inp-name').value.trim();
  var gender = document.getElementById('inp-gender').value;
  var dob = document.getElementById('inp-dob').value;
  document.getElementById('f-name').classList.toggle('has-error', !name);
  document.getElementById('f-gender').classList.toggle('has-error', !gender);
  document.getElementById('f-dob').classList.toggle('has-error', !dob);
  return !!(name && gender && dob);
}

function callClaude(prompt) {
  return fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 1000,
      messages: [{ role: 'user', content: prompt }]
    })
  }).then(function(r) { return r.json(); }).then(function(d) {
    return (d.content || []).map(function(c) { return c.text || ''; }).join('');
  });
}

function generateAllAI(info) {
  var base = 'あなたは九星気学の専門家です。以下の正確な暦データをもとに鑑定文を書いてください。\n'
    + '名前: ' + info.name + '（' + info.gender + '）\n'
    + '生年月日: ' + info.dobDisplay + '\n'
    + '年九星（本命星）: ' + info.nenKyusei + '\n'
    + '年干支: ' + info.nenKan + '・' + info.nenShi + '\n'
    + '月九星（月命星）: ' + info.tsuKyusei + '\n'
    + '月干支: ' + info.tsuKan + '・' + info.tsuShi + '\n'
    + '日九星: ' + info.nichiKyusei + '\n'
    + '日干支: ' + info.nichiKan + '・' + info.nichiShi + '\n'
    + '陰陽: ' + info.inyo + '\n';

  var monthlyPrompt = base
    + '\n2026年1月から12月の月別運気を、JSON配列のみで返してください。'
    + 'preambleやマークダウン記号は不要です。配列だけ返してください。'
    + 'フォーマット: [{"month":"1月","text":"説明（50字程度）"},{"month":"2月","text":"..."},...]';

  return Promise.all([
    callClaude(base + '\n性格の特徴について、200〜250字で具体的に鑑定文を書いてください。'),
    callClaude(base + '\n仕事運・職業適性について、200〜250字で具体的に鑑定文を書いてください。'),
    callClaude(base + '\n2026年の運気の流れについて、200〜250字で具体的に鑑定文を書いてください。'),
    callClaude(monthlyPrompt)
  ]).then(function(results) {
    var monthlyData;
    try {
      var cleaned = results[3].replace(/^[\s\S]*?(\[[\s\S]*\])[\s\S]*$/, '$1');
      monthlyData = JSON.parse(cleaned);
    } catch(e) {
      monthlyData = [];
      for (var i = 1; i <= 12; i++) {
        monthlyData.push({ month: i + '月', text: '取得できませんでした。' });
      }
    }
    return { seikaku: results[0], shigoto: results[1], un2026: results[2], monthlyData: monthlyData };
  });
}

function createKanteisho() {
  if (!validate()) return;

  var name = document.getElementById('inp-name').value.trim();
  var gender = document.getElementById('inp-gender').value;
  var dobStr = document.getElementById('inp-dob').value;
  var birthTime = document.getElementById('inp-time').value;

  var rec = lookupDB(dobStr);
  if (!rec) {
    alert('この生年月日はデータベースに見つかりませんでした。\n対応範囲: 1926年〜2060年');
    return;
  }

  var dob = new Date(dobStr + 'T00:00:00');
  var dobDisplay = dob.toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric' });

  document.getElementById('form-section').style.display = 'none';
  document.getElementById('loading-section').style.display = 'block';

  // 鑑定表
  var tbody = document.getElementById('kanteihyo-body');
  var timeRow = birthTime
    ? '<tr><td>時</td><td>—</td><td>—</td><td>' + birthTime + '</td><td>—</td></tr>'
    : '';
  tbody.innerHTML =
    '<tr><td>年（本命星）</td><td>' + rec.nenKyusei + '</td><td>' + rec.nenKan + '</td><td>' + rec.nenShi + '</td><td>' + rec.inyo + '</td></tr>'
    + '<tr><td>月（月命星）</td><td>' + rec.tsuKyusei + '</td><td>' + rec.tsuKan + '</td><td>' + rec.tsuShi + '</td><td>—</td></tr>'
    + '<tr><td>日</td><td>' + rec.nichiKyusei + '</td><td>' + rec.nichiKan + '</td><td>' + rec.nichiShi + '</td><td>—</td></tr>'
    + timeRow;

  // 個人情報
  var timeInfo = birthTime
    ? '<div><span>生時:</span><strong>' + birthTime + '</strong></div>' : '';
  document.getElementById('person-info').innerHTML =
    '<div><span>お名前:</span><strong>' + name + '</strong></div>'
    + '<div><span>性別:</span><strong>' + gender + '</strong></div>'
    + '<div><span>生年月日:</span><strong>' + dobDisplay + '</strong></div>'
    + timeInfo
    + '<div><span>本命星:</span><strong>' + rec.nenKyusei + '</strong></div>'
    + '<div><span>月命星:</span><strong>' + rec.tsuKyusei + '</strong></div>';

  var info = {
    name: name, gender: gender, dobDisplay: dobDisplay,
    nenKyusei: rec.nenKyusei, nenKan: rec.nenKan, nenShi: rec.nenShi,
    tsuKyusei: rec.tsuKyusei, tsuKan: rec.tsuKan, tsuShi: rec.tsuShi,
    nichiKyusei: rec.nichiKyusei, nichiKan: rec.nichiKan, nichiShi: rec.nichiShi,
    inyo: rec.inyo
  };

  generateAllAI(info).then(function(ai) {
    document.getElementById('ai-seikaku').textContent = ai.seikaku;
    document.getElementById('ai-shigoto').textContent = ai.shigoto;
    document.getElementById('ai-2026').textContent = ai.un2026;
    var grid = document.getElementById('ai-monthly');
    grid.innerHTML = ai.monthlyData.map(function(m) {
      return '<div class="month-card"><div class="month-label">' + m.month + '</div><div class="month-text">' + m.text + '</div></div>';
    }).join('');
    document.getElementById('loading-section').style.display = 'none';
    document.getElementById('result-section').style.display = 'block';
  }).catch(function() {
    document.getElementById('ai-seikaku').textContent = 'AIとの通信に失敗しました。';
    document.getElementById('ai-shigoto').textContent = 'AIとの通信に失敗しました。';
    document.getElementById('ai-2026').textContent = 'AIとの通信に失敗しました。';
    document.getElementById('loading-section').style.display = 'none';
    document.getElementById('result-section').style.display = 'block';
  });
}

function goBack() {
  document.getElementById('result-section').style.display = 'none';
  document.getElementById('form-section').style.display = 'block';
}
</script>
</body>
</html>
